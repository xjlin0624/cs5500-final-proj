name: Backend CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Import smoke check
        run: |
          python -c "import backend.app.models"
          python -c "from backend.app.workers.celery_app import celery_app; import backend.app.tasks.price_monitoring; import backend.app.tasks.subscriptions"

      - name: Run tests
        run: pytest backend/tests

      - name: Validate Docker Compose
        run: docker compose config > /dev/null
