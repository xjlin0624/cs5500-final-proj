name: Feature request
description: Propose a feature or project improvement.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or project problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the expected behavior, interfaces, or workflow.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Constraints or notes
      description: Dependencies, rollout concerns, or open questions.
