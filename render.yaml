services:
  - type: redis
    name: aftercart-redis
    plan: starter

  - type: web
    name: aftercart-api
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    dockerCommand: bash -lc "alembic -c backend/alembic.ini upgrade head && uvicorn backend.app.main:app --host 0.0.0.0 --port 8000"
    autoDeploy: true
    healthCheckPath: /api/health/ready
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        fromDatabase:
          name: aftercart-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: aftercart-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: aftercart-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: aftercart-redis
          property: connectionString

  - type: worker
    name: aftercart-worker
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    dockerCommand: celery -A backend.app.workers.celery_app.celery_app worker --loglevel=INFO
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        fromDatabase:
          name: aftercart-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: aftercart-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: aftercart-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: aftercart-redis
          property: connectionString

  - type: worker
    name: aftercart-beat
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    dockerCommand: celery -A backend.app.workers.celery_app.celery_app beat --loglevel=INFO
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        fromDatabase:
          name: aftercart-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: aftercart-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: aftercart-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: aftercart-redis
          property: connectionString

databases:
  - name: aftercart-postgres
